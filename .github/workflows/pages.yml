name: Deploy demo to GitHub Pages

# Builds the wasm decoder, stages the self-contained demo site (single demo +
# examples gallery) into dist/demo via `just demo-build`, and publishes it to
# GitHub Pages. Enable once in repo Settings > Pages > Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deploy at a time; newer pushes supersede older runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true # the data/dif-examples/*.dif gallery assets live in git-LFS
      # The wasm decoder builds lzav-shim (dif-core c-codecs), whose source is a
      # vendored submodule. Mirror README's documented init so the build has it.
      - name: Sync and init submodules
        run: git submodule sync && git submodule update --init
      - uses: actions/configure-pages@v6
      # Third-party actions are pinned to a commit SHA (supply-chain safety);
      # the trailing comment tracks the human-readable version.
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install binaryen (wasm-opt for the -Oz pass)
        run: sudo apt-get update && sudo apt-get install -y binaryen
      - name: Build wasm decoder and stage the demo
        run: |
          just wasm-setup
          just demo-build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist/demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
