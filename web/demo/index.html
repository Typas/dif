<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DIF --- theme-aware image demo</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font-family: system-ui, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        gap: 1rem;
        background: #ffffff;
        color: #111111;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #1e1e1e; color: #eeeeee; }
      }
      canvas { border: 1px solid currentColor; max-width: 90vw; height: auto; image-rendering: pixelated; }
      .bar { display: flex; gap: 1rem; align-items: center; }
      button { font: inherit; padding: 0.4rem 0.8rem; }
      code { opacity: 0.7; }
    </style>
  </head>
  <body>
    <h1>DIF theme-aware decoder</h1>
    <p>Same <code>.dif</code> file, rendered for: <strong id="mode">...</strong> (follows OS theme)</p>
    <canvas id="view" width="800" height="600"></canvas>
    <div class="bar">
      <button id="toggle">Override theme</button>
      <span id="info"></span>
    </div>
    <!-- The wasm decoder is built for wasm32-wasip1 (so the C codecs zstd/lzav
         get wasi-libc's malloc). Resolve its wasi import to a no-op shim --- the
         codecs do no I/O, so nothing here is called on the decode path. -->
    <script type="importmap">
      { "imports": { "wasi_snapshot_preview1": "./wasi_shim.js" } }
    </script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
